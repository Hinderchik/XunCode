name: vscode_android
description: Mobile VSCode for Android — Monaco Editor, GitHub-based plugins, Tor proxy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  dio: ^5.7.0
  http: ^1.2.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/editor.html
    - assets/plugin-docs.html
    - assets/plugin-examples/hello-world/
    - assets/monaco/vs/
    - assets/monaco/vs/base/worker/
    - assets/monaco/vs/basic-languages/
    - assets/monaco/vs/editor/
    - assets/monaco/vs/language/
