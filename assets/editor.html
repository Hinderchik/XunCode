<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XunCode Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
  #editor { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="monaco/vs/loader.js"></script>
<script>
require.config({ paths: { vs: 'monaco/vs' } });
require(['vs/editor/editor.main'], function() {

  window.editor = monaco.editor.create(document.getElementById('editor'), {
    value: '',
    language: 'plaintext',
    theme: 'vs-dark',
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
    fontLigatures: true,
    automaticLayout: true,
    minimap: { enabled: false },
    wordWrap: 'on',
    lineNumbers: 'on',
    renderLineHighlight: 'all',
    scrollBeyondLastLine: false,
    smoothScrolling: true,
    cursorBlinking: 'smooth',
    cursorSmoothCaretAnimation: 'on',
    tabSize: 2,
    insertSpaces: true,
    formatOnPaste: true,
    suggestOnTriggerCharacters: true,
    quickSuggestions: true,
    parameterHints: { enabled: true },
    folding: true,
    bracketPairColorization: { enabled: true },
    guides: { bracketPairs: true, indentation: true },
    padding: { top: 8, bottom: 8 },
  });

  const _workspaceFiles = new Map();
  const _definitionCache = new Map();

  function _setCurrentModelMeta(language, filename) {
    const model = window.editor.getModel();
    if (!model) return;
    model._vscodeFilename = filename || '';
    model._vscodeLanguage = language || 'plaintext';
  }

  function _buildDefinitionIndex(model) {
    if (!model) return [];
    const lines = model.getValue().split('\n');
    const defs = [];
    lines.forEach((line, i) => {
      const patterns = [
        /\bfunction\s+([A-Za-z_$][\w$]*)/,
        /\bclass\s+([A-Za-z_$][\w$]*)/,
        /\bdef\s+([A-Za-z_$][\w$]*)/,
        /\bconst\s+([A-Za-z_$][\w$]*)\s*=\s*(?:async\s*)?(?:\(|function)/,
        /\blet\s+([A-Za-z_$][\w$]*)\s*=\s*(?:async\s*)?(?:\(|function)/,
        /\bvar\s+([A-Za-z_$][\w$]*)\s*=\s*(?:async\s*)?(?:\(|function)/,
      ];
      for (const re of patterns) {
        const m = line.match(re);
        if (m) defs.push({ name: m[1], line: i + 1, column: line.indexOf(m[1]) + 1 });
      }
    });
    return defs;
  }

  function _refreshDefinitionCache() {
    const model = window.editor.getModel();
    if (!model) return;
    const key = model.uri.toString();
    _definitionCache.set(key, _buildDefinitionIndex(model));
  }

  function _findDefinition(name) {
    const model = window.editor.getModel();
    if (!model) return null;
    const key = model.uri.toString();
    const defs = _definitionCache.get(key) || _buildDefinitionIndex(model);
    return defs.find(d => d.name === name) || null;
  }

  // Settings tweakable from Flutter via window.applyCompletionSettings.
  window.__xc_completion = { enabled: true, delayMs: 150, maxItems: 50 };
  window.applyCompletionSettings = function(s) {
    if (!s) return;
    if (typeof s.enabled === 'boolean') window.__xc_completion.enabled = s.enabled;
    if (typeof s.delayMs === 'number') window.__xc_completion.delayMs = s.delayMs;
    if (typeof s.maxItems === 'number') window.__xc_completion.maxItems = s.maxItems;
  };

  // Map our SymbolKind → monaco.languages.CompletionItemKind so that the
  // suggestions panel shows a meaningful icon instead of the plain text bullet.
  const _kindMap = {
    method: monaco.languages.CompletionItemKind.Method,
    function: monaco.languages.CompletionItemKind.Function,
    constant: monaco.languages.CompletionItemKind.Constant,
    variable: monaco.languages.CompletionItemKind.Variable,
    klass: monaco.languages.CompletionItemKind.Class,
    module: monaco.languages.CompletionItemKind.Module,
    keyword: monaco.languages.CompletionItemKind.Keyword,
    text: monaco.languages.CompletionItemKind.Text,
  };

  const _langs = ['javascript','typescript','python','kotlin','java','dart','go','rust','c','cpp','csharp','html','css','scss','json','yaml','markdown','shell','xml','php','ruby','swift','sql','r','lua','plaintext'];
  _langs.forEach((lang) => {
    monaco.languages.registerCompletionItemProvider(lang, {
      triggerCharacters: ['.', ':', '_', '('],
      provideCompletionItems: async function(model, position) {
        const word = model.getWordUntilPosition(position);
        const range = new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn);

        // Slow start: optional debounce so we don't fire on every keystroke.
        const cfg = window.__xc_completion;
        if (cfg && cfg.delayMs > 0) {
          await new Promise(r => setTimeout(r, cfg.delayMs));
        }

        // Local words from the current document (always on, even when the
        // remote provider is disabled — Monaco's built-in behavior).
        const words = new Set();
        const text = model.getValue();
        text.match(/[A-Za-z_$][\w$]*/g)?.forEach(w => words.add(w));
        if (word.word) words.delete(word.word);
        const localItems = Array.from(words).slice(0, 200).map(w => ({
          label: w,
          kind: monaco.languages.CompletionItemKind.Text,
          insertText: w,
          range,
        }));

        // Remote symbols indexed by Flutter from the rest of the project.
        let remoteItems = [];
        if (cfg && cfg.enabled !== false && window.flutter_inappwebview) {
          try {
            const res = await window.flutter_inappwebview.callHandler('getCompletions', {
              language: model.getLanguageId(),
              prefix: word.word || '',
              path: window.__xc_currentPath || '',
              maxItems: (cfg && cfg.maxItems) || 50,
            });
            if (Array.isArray(res)) {
              remoteItems = res.map(it => ({
                label: it.label || '',
                kind: _kindMap[it.kind] ?? monaco.languages.CompletionItemKind.Text,
                insertText: it.insertText || it.label || '',
                detail: it.detail || undefined,
                documentation: it.documentation || undefined,
                range,
              }));
            }
          } catch (_) {
            // Backend offline / not bridged yet — fall back to local words.
          }
        }
        return { suggestions: [...remoteItems, ...localItems] };
      }
    });

    monaco.languages.registerDefinitionProvider(lang, {
      provideDefinition: function(model, position) {
        const word = model.getWordAtPosition(position);
        if (!word) return [];
        const def = _findDefinition(word.word);
        if (!def) return [];
        return [{
          uri: model.uri,
          range: new monaco.Range(def.line, def.column, def.line, def.column + word.word.length)
        }];
      }
    });

    monaco.languages.registerHoverProvider(lang, {
      provideHover: function(model, position) {
        const word = model.getWordAtPosition(position);
        if (!word) return null;
        const def = _findDefinition(word.word);
        if (!def) return null;
        return {
          range: new monaco.Range(def.line, def.column, def.line, def.column + word.word.length),
          contents: [{ value: `**${word.word}**\n\nDefined at line ${def.line}` }]
        };
      }
    });

    monaco.languages.registerRenameProvider(lang, {
      provideRenameEdits: function(model, position, newName) {
        const word = model.getWordAtPosition(position);
        if (!word) throw new Error('Nothing to rename');
        const matches = model.findMatches(`\\b${word.word}\\b`, true, false, true, null, true);
        return {
          edits: matches.map(m => ({ resource: model.uri, edit: { range: m.range, text: newName } })),
          rejectReason: null
        };
      }
    });
  });

  window.editor.onDidChangeModelContent(function() {
    _refreshDefinitionCache();
  });

  _refreshDefinitionCache();
  setTimeout(_refreshDefinitionCache, 0);

  // Cursor position → Flutter
  window.editor.onDidChangeCursorPosition(function(e) {
    if (window.flutter_inappwebview) {
      window.flutter_inappwebview.callHandler('onCursorChange',
        e.position.lineNumber, e.position.column);
    }
  });

  // Selection → Flutter
  window.editor.onDidChangeCursorSelection(function(e) {
    const sel = window.editor.getModel()?.getValueInRange(e.selection) ?? '';
    if (window.flutter_inappwebview) {
      window.flutter_inappwebview.callHandler('onSelectionChange', sel);
    }
  });

  // Content change → Flutter
  window.editor.onDidChangeModelContent(function() {
    if (window.flutter_inappwebview) {
      window.flutter_inappwebview.callHandler('onContentChange');
    }
  });

  // ── Public API called from Flutter ──────────────────────────────────────

  window.loadFile = function(content, language, filename) {
    const model = monaco.editor.createModel(content, language);
    model.uri = monaco.Uri.parse('file:///' + (filename || 'untitled'));
    _setCurrentModelMeta(language, filename);
    window.editor.setModel(model);
    window.__xc_currentPath = filename || '';
    _refreshDefinitionCache();
  };

  window.runCommand = function(cmd) {
    if (!cmd) return;
    const selection = window.editor.getSelection();
    const model = window.editor.getModel();
    if (!model) return;
    if (cmd === 'goToDefinition') {
      const pos = window.editor.getPosition();
      const word = model.getWordAtPosition(pos);
      if (!word) return;
      const def = _findDefinition(word.word);
      if (def) window.editor.setPosition({ lineNumber: def.line, column: def.column });
      return;
    }
    if (cmd === 'formatDocument') {
      window.editor.getAction('editor.action.formatDocument')?.run();
      return;
    }
    if (cmd === 'showQuickHelp') {
      _toast(selection || 'No selection', false);
    }
  };

  window.getWorkspaceSymbols = function() {
    const model = window.editor.getModel();
    return _buildDefinitionIndex(model);
  };

  window.applySettings = function(s) {
    window.editor.updateOptions({
      fontSize: s.fontSize || 14,
      fontFamily: s.fontFamily ? `'${s.fontFamily}', monospace` : undefined,
      tabSize: s.tabSize || 2,
      wordWrap: s.wordWrap || 'on',
    });
  };

  // ── Plugin System Runtime ────────────────────────────────────────────────

  const _plugins = {};
  const _hooks = { fileSave: [], fileOpen: [], editorReady: [] };
  const _statusItems = [];

  window.VscodePlugin = {
    register(manifest) {
      if (!manifest.id) return console.error('[Plugin] missing id');
      const ctx = _buildCtx(manifest.id);
      _plugins[manifest.id] = { manifest, ctx };
      try {
        manifest.activate(ctx);
        console.log('[Plugin] loaded:', manifest.id);
      } catch(e) {
        console.error('[Plugin] error in', manifest.id, e);
      }
    }
  };

  function _buildCtx(pluginId) {
    const prefix = 'plugin:' + pluginId + ':';
    const ed = window.editor;
    const _saveHandlers = [];
    const _openHandlers = [];
    const _changeHandlers = [];
    const _cursorHandlers = [];

    ed.onDidChangeCursorPosition((e) => {
      _cursorHandlers.forEach(fn => { try { fn({ line: e.position.lineNumber, column: e.position.column }); } catch(_) {} });
    });

    return {
      editor: {
        // Canonical names
        getValue: () => ed.getValue(),
        setValue: (v) => ed.setValue(v ?? ''),
        getSelection: () => ed.getModel()?.getValueInRange(ed.getSelection()) ?? '',
        replaceSelection: (text) => ed.executeEdits('plugin', [{
          range: ed.getSelection(), text: text ?? '', forceMoveMarkers: true,
        }]),
        getLanguage: () => ed.getModel()?.getLanguageId() ?? 'plaintext',
        setLanguage: (lang) => {
          const m = ed.getModel();
          if (m) monaco.editor.setModelLanguage(m, lang);
        },
        getCursorPosition: () => {
          const p = ed.getPosition();
          return p ? { line: p.lineNumber, column: p.column } : { line: 1, column: 1 };
        },
        formatDocument: () => ed.getAction('editor.action.formatDocument')?.run(),
        format: () => ed.getAction('editor.action.formatDocument')?.run(),
        addAction: (action) => {
          if (!action || !action.id || typeof action.run !== 'function') return;
          ed.addAction({
            id: action.id,
            label: action.label || action.id,
            keybindings: Array.isArray(action.keybindings) ? action.keybindings : [],
            run: () => { try { action.run(); } catch(e) { console.error('[Plugin action]', e); } },
          });
        },
        addCommand: (cmd) => {
          if (!cmd || typeof cmd.run !== 'function') return;
          if (cmd.keybinding && monaco.KeyCode[cmd.keybinding]) {
            ed.addCommand(monaco.KeyCode[cmd.keybinding], cmd.run);
          }
          if (cmd.id && cmd.label) {
            ed.addAction({
              id: cmd.id,
              label: cmd.label,
              keybindings: [],
              run: () => { try { cmd.run(); } catch(e) { console.error('[Plugin cmd]', e); } },
            });
          }
        },
        onDidChangeContent: (fn) => ed.onDidChangeModelContent(() => {
          try { fn(ed.getValue()); } catch(_) {}
        }),
        // Aliases used by docs/plugin-api.md and plugin-docs.html
        getText: () => ed.getValue(),
        setText: (v) => ed.setValue(v ?? ''),
        insertText: (text) => ed.executeEdits('plugin', [{
          range: ed.getSelection(), text: text ?? '', forceMoveMarkers: true,
        }]),
      },
      ui: {
        showMessage: (text) => _toast(String(text ?? ''), false),
        showError: (text) => _toast(String(text ?? ''), true),
        showInputBox: (opts) => Promise.resolve(window.prompt(
          (opts && (opts.title || opts.placeholder)) || '',
          (opts && opts.value) || ''
        )),
        showQuickPick: (items) => {
          if (!Array.isArray(items) || items.length === 0) return Promise.resolve(null);
          const choice = window.prompt('Choose:\n' + items.map((it, i) => `${i + 1}. ${it}`).join('\n'));
          const idx = parseInt(choice, 10) - 1;
          return Promise.resolve(idx >= 0 && idx < items.length ? items[idx] : null);
        },
        addStatusBarItem: (item) => {
          _statusItems.push(item);
          if (window.flutter_inappwebview) {
            window.flutter_inappwebview.callHandler('addStatusItem', item.id, item.text);
          }
        },
      },
      hooks: {
        onFileSave: (fn) => { _hooks.fileSave.push(fn); _saveHandlers.push(fn); },
        onSave: (fn) => { _hooks.fileSave.push(fn); _saveHandlers.push(fn); },
        onFileOpen: (fn) => { _hooks.fileOpen.push(fn); _openHandlers.push(fn); },
        onChange: (fn) => {
          _changeHandlers.push(fn);
          ed.onDidChangeModelContent(() => { try { fn(ed.getValue()); } catch(_) {} });
        },
        onCursorMove: (fn) => { _cursorHandlers.push(fn); },
        onEditorReady: (fn) => setTimeout(fn, 0),
      },
      storage: {
        get: (k) => localStorage.getItem(prefix + k),
        set: (k, v) => localStorage.setItem(prefix + k, v),
        remove: (k) => localStorage.removeItem(prefix + k),
      },
      http: {
        get: (url, headers = {}) => fetch(url, { headers }).then(async r => ({
          status: r.status, body: await r.text(),
        })),
        post: (url, body, headers = {}) => fetch(url, {
          method: 'POST',
          body: typeof body === 'string' ? body : JSON.stringify(body ?? {}),
          headers: { 'Content-Type': 'application/json', ...headers },
        }).then(async r => ({ status: r.status, body: await r.text() })),
      },
    };
  }

  function _toast(msg, isError) {
    const el = document.createElement('div');
    el.textContent = msg;
    Object.assign(el.style, {
      position: 'fixed', bottom: '16px', left: '50%',
      transform: 'translateX(-50%)',
      background: isError ? '#5a1d1d' : '#252526',
      color: isError ? '#f48771' : '#d4d4d4',
      padding: '8px 16px', borderRadius: '4px',
      fontSize: '13px', zIndex: '9999',
      border: '1px solid ' + (isError ? '#f48771' : '#3c3c3c'),
      pointerEvents: 'none',
    });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // Fire editorReady hooks
  _hooks.editorReady.forEach(fn => { try { fn(); } catch(e) {} });
});
</script>
</body>
</html>
