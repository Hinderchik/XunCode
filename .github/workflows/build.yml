name: Build APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.txt'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install npm deps and bundle Monaco Editor
        run: npm install && npm run build:monaco

      - name: Verify proot binary exists
        run: |
          if [ ! -f "android/app/src/main/jniLibs/arm64-v8a/libproot.so" ]; then
            echo "Error: libproot.so not found in jniLibs"
            echo "Please ensure the binary is committed to the repository"
            exit 1
          fi
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot.so
          echo "proot binary found and ready"

      - name: Verify AXS binary exists
        run: |
          if [ ! -f "assets/axs/axs" ]; then
            echo "AXS binary not found in assets, downloading..."
            mkdir -p assets/axs
            curl -L -o assets/axs/axs https://github.com/bajrangCoder/acodex_server/releases/latest/download/axs-musl-android-arm64
            chmod +x assets/axs/axs
          fi
          if [ ! -f "android/app/src/main/jniLibs/arm64-v8a/libaxs.so" ]; then
            mkdir -p android/app/src/main/jniLibs/arm64-v8a
            cp assets/axs/axs android/app/src/main/jniLibs/arm64-v8a/libaxs.so
          fi
          file assets/axs/axs
          echo "AXS binary ready"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons from icon.png
        run: flutter pub run flutter_launcher_icons:main

      - name: Analyze Dart sources
        run: flutter analyze --no-fatal-infos

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
